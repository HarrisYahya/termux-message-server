<!DOCTYPE html>
<html>
<head>
<title>Send Message</title>
<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px 20px;
}
</style>
</head>

<body>

<h2>Send Message to Termux</h2>

<input id="msg" placeholder="type message here">
<button onclick="send()">Send</button>

<script>

async function send(){

const message = document.getElementById("msg").value

await fetch("/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
})

document.getElementById("msg").value=""

}

</script>

</body>
</html>
